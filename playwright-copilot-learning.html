ten code."},{heading:"What You'll Be Able To Do",content:"By the end of this guide, regardless of your role, you will be able to: record user flows and turn them into repeatable tests, use Copilot Chat prompts to generate and refine tests from plain English, read test output and identify what failed, contribute test cases to the team's test suite via merge requests, and apply the team's human-in-the-loop review checklist before merging.",table:{headers:["Skill","Developer Track","Non-Coder Track"],rows:[["Record a test","✅ Lesson 4","✅ Lesson 4"],["Write tests from scratch","✅ Lesson 5–6","⏭ Optional"],["Use Copilot prompts","✅ Lesson 3","✅ Lesson 3 + 8"],["Read test results","✅ Lesson 9","✅ Lesson 9"],["Page Object Model","✅ Lesson 6","⏭ Awareness only"],["HITL Review Checklist","✅ Lesson 10","✅ Lesson 10"],["Prompt Templates","✅ Lesson 8","✅ Lesson 8"]]}},{heading:"The Mental Model",content:"Think of it this way: Playwright is a robot that clicks through your app exactly how a user would. Copilot is a writing assistant that helps you tell that robot what to do. You describe the user journey. Copilot translates it into instructions. Playwright executes those instructions across browsers. You review the results and confirm correctness. The human is always the final authority on whether a test is right.",tip:"If you've ever written a detailed bug report with steps to reproduce — you already have the core skill. That's exactly what a Playwright test is: steps to reproduce, plus expected results."}],quiz:{question:"Who needs to review every AI-generated test before it merges?",options:["Only senior developers","The AI itself validates correctness","A human reviewer — always","Nobody, if the test passes"],correctIndex:2,explanation:"Human-in-the-loop governance means a human always reviews AI-generated test code against the acceptance criteria before merge. Passing tests can still be testing the wrong thing."}},{id:100,title:"Mindset Shifts: Manual → Automated",subtitle:"The 5 mental model changes that trip up every manual tester",icon:"🧠",audience:"All Roles — Non-Coder Essential",sections:[{heading:"Your Manual Testing Skills ARE the Foundation",content:"Here's what the industry gets wrong: they treat automation as an upgrade from manual testing, when it's actually a different output format for the same core skills. You already know how to analyze requirements, identify edge cases, think about user flows, and recognize when something 'feels wrong.' Those skills are harder to teach than any programming language. The research is clear — the real skill in automation is the testing thinking that goes into the test, not the code.",callout:"If you've ever written a detailed bug report with steps to reproduce, expected vs. actual results, and environment details — you already think like a test automator. A Playwright test is just that same report written in a format a computer can execute."},{heading:"Shift 1: From 'I Am the Test Tool' to 'I Instruct the Test Tool'",content:"In manual testing, you ARE the software agent executing the test. Your eyes validate the UI, your brain catches oddities, your intuition flags issues. In automation, you hand those instructions to a robot. The critical shift: the robot only checks what you explicitly tell it to check. It has no eyes, no intuition, and no understanding of your application. If you don't write an assertion, it won't notice a problem — even if the entire page is broken.",warning:"The #1 mistake manual testers make in automation: creating flows with no assertions. The test 'passes' because the app didn't crash, but nothing was actually verified. A test without assertions is like a manual test where you click through the app with your eyes closed."},{heading:"Shift 2: From End-to-End Flows to Targeted Checks",content:"Manual testers are trained to walk through entire workflows. You test login → search → add to cart → checkout as one continuous flow, because you can't teleport to the middle of a workflow. Automated tests CAN start anywhere. You can navigate directly to the checkout page with pre-loaded data. Testing everything in one long flow is called 'over-testing' in automation — it makes tests slow, fragile, and hard to debug because you can't tell which step actually failed.",table:{headers:["Manual Habit","Why It's a Problem in Automation","Better Approach"],rows:[["Test the full flow every time","Long tests are slow and fragile — one early failure hides all later results","Break into focused tests: login test, search test, checkout test"],["Verify everything you see on a page","Too many assertions = too many failure points = flaky tests","Assert only the specific behavior this test is checking"],["Always start from the login page","Wastes time re-testing login in every test","Use auth fixtures to skip login and go directly to the page you're testing"],["Create test data through the UI","Slow and unreliable — the UI might change","Use API calls or database fixtures to create test data before the test runs"]]}},{heading:"Shift 3: From One-Time Execution to Repeatable Scripts",content:"Manual tests adapt on the fly. If a button moved, you find it. If a label changed, you read the new one. Automated tests are deterministic — they do exactly what you told them, no more, no less. If the button moved and your selector doesn't match, the test fails. This means you have to think about resilience when writing tests: using stable selectors (data-testid, not CSS classes), avoiding hardcoded values, and designing tests that aren't brittle when the UI changes.",tip:"Think of an automated test like a recipe for someone who has never cooked. You can't say 'add a pinch of salt' — you need to say 'measure 1/4 teaspoon of salt and add it to the bowl.' Every instruction must be explicit and unambiguous."},{heading:"Shift 4: From 'It Works' to 'The Right Thing Happened'",content:"Manual testers naturally evaluate the whole screen. You notice if the layout looks weird, if text is truncated, or if a color is off. Automation can't do that (yet). A test that clicks 'Submit' and doesn't crash reports a pass — even if the form submitted to the wrong endpoint, saved the wrong data, or showed a success message with an error code behind it. You must teach the test what 'correct' looks like with specific assertions.",table:{headers:["Scenario","Manual Tester Catches This","Automation Misses Unless You Assert"],rows:[["Form submits but shows 'Error 500' in small text","✅ You see the error message","❌ Test passed — it just checked the page loaded"],["Cart total shows $0.00 after adding items","✅ You know that's wrong","❌ Test passed — it only verified the element exists"],["Login works but lands on the wrong dashboard","✅ You notice the wrong page","❌ Test passed — it only checked the URL changed"],["Search returns results but they're from wrong category","✅ You read the results","❌ Test passed — it only counted the result count"]]},warning:"Every scenario above is a real bug that would pass automated testing without proper assertions. This is why the HITL review checklist exists — humans catch what robots miss."},{heading:"Shift 5: From Ad-Hoc Execution to Structured Maintenance",content:"In manual testing, updating test cases is straightforward — change the steps document. In automation, test maintenance is a continuous discipline. When the app changes, selectors break, expected text changes, and flows evolve. Industry data shows that teams that don't plan for maintenance see their test suites decay within 3–6 months. The Page Object Model pattern (Lesson 6) exists specifically to make maintenance manageable by centralizing selectors in one place.",tip:"Budget 20% of your testing time for maintenance. If you write 10 new tests this sprint, expect to fix or update 2 existing ones. This is normal — not a failure."},{heading:"What Stays the Same",content:"Some of your most valuable manual testing skills transfer directly and require zero adjustment. Exploratory testing — automation handles regression, which frees you to explore and find the bugs no one anticipated. Risk-based prioritization — you know which features break most often and where users struggle. Domain knowledge — you understand the business rules that determine whether a test assertion is actually correct. Bug triage — you can read a failing test and determine whether it's a test problem, an environment problem, or a real application defect. These are the skills that make you irreplaceable, and no amount of AI changes that.",callout:"Automation handles the boring, repetitive checking. You handle the interesting, creative testing. That's the division of labor that makes a great QA team."}],quiz:{question:"A manual tester records a Playwright test that walks through the entire checkout flow (login → search → add to cart → pay → confirm). What's the problem?",options:["Nothing — comprehensive tests are always better","The test is too long; if login fails, you won't know if checkout also has a bug","Playwright can't handle multi-step flows","The test should be written in Python, not TypeScript"],correctIndex:1,explanation:"Long end-to-end tests are fragile because an early failure masks all later checks. If login breaks, you learn nothing about search, cart, or checkout. Break it into focused, independent tests — each targeting one capability with one clear set of assertions."}},{id:101,title:"What to Automate (and What Not To)",subtitle:"Not every test deserves a script — here's how to decide",icon:"🎯",audience:"All Roles — Non-Coder Essential",sections:[{heading:"The Automation Decision Framework",content:"One of the most common mistakes new automation teams make is trying to automate everything. Industry leaders typically achieve 60–80% automation coverage for regression testing, and that's considered excellent. The remaining 20–40% consists of tests where manual execution is more practical, cost-effective, or genuinely necessary. Your goal isn't 100% automation — it's automating the RIGHT things."},{heading:"Automate These (High Value)",content:"These test types deliver the highest return on automation investment. They run often, they're repetitive, and they catch regression bugs early.",table:{headers:["Test Type","Why Automate","Example"],rows:[["Regression tests","Run every sprint — too many for manual execution","Login flow, core navigation, CRUD operations"],["Smoke tests","Must pass before any other testing starts","Homepage loads, API responds, auth works"],["Data-driven tests","Same flow with hundreds of input variations","Form validation with valid/invalid email formats"],["Cross-browser checks","Impractical to test 3+ browsers manually every time","Layout renders correctly in Chrome, Firefox, Safari"],["Happy path flows","Critical business paths that must never break","User signup → first order → confirmation"]]}},{heading:"Keep These Manual (Low Automation Value)",content:"These tests require human judgment, are run rarely, or cost more to automate and maintain than they save.",table:{headers:["Test Type","Why Keep Manual","Example"],rows:[["Exploratory testing","Requires curiosity, intuition, and creative deviation from scripts","Trying unexpected inputs to see what breaks"],["Usability / UX testing","Automation can't judge if a flow 'feels confusing'","Is the checkout flow intuitive for first-time users?"],["One-time tests","Automating a test you'll run once wastes time","Verifying a data migration completed correctly"],["Visual design review","Automation can't assess aesthetic quality","Does the new design match the mockups?"],["Edge cases in unstable features","Features still changing → tests break every sprint","A feature in active development that changes weekly"]]}},{heading:"The Decision Flowchart",content:"When looking at a test case, ask these four questions in order. If any answer is 'No,' consider keeping it manual.",table:{headers:["#","Question","If No →"],rows:[["1","Will this test run more than 3 times?","Keep manual — automation ROI too low"],["2","Can the expected result be verified by code (not human judgment)?","Keep manual — need human eyes"],["3","Is the feature stable enough that the test won't break next sprint?","Wait to automate — too much maintenance debt"],["4","Can test data be created programmatically?","Automate with caution — data setup may be fragile"]]},tip:"Non-coders: Use this flowchart when deciding which acceptance criteria to record as Playwright tests vs. which to keep in your manual test suite. Not everything needs to be automated."},{heading:"The Hybrid Approach",content:"The best teams don't choose between manual and automated — they combine both strategically. Automate the repetitive regression checks so your manual testers are freed up for the high-value work: exploratory testing, usability evaluation, and creative edge case discovery. Think of it as: automation handles the checking (did the expected thing happen?), humans handle the testing (is this actually the right thing?).",callout:"Automation handles checking: did the button work? Did the page load? Did the data save? Humans handle testing: is this confusing? Does this flow make sense? What would a real user try that we haven't thought of?"},{heading:"Start Small, Expand Gradually",content:"Don't try to automate your entire regression suite in week one. Start with the 10 most-repeated manual test cases. Automate those. Stabilize them. Then expand. Industry guidance is consistent: begin with small, low-risk pilot projects, validate the approach, and gradually increase coverage. Teams that try to automate everything at once typically see their suites decay within months because maintenance overwhelms the team.",table:{headers:["Week","Target","Expected Outcome"],rows:[["1–2","Automate 5 smoke tests (login, nav, homepage)","Team learns the toolchain, builds confidence"],["3–4","Add 10 regression tests for core features","First real regression catches in CI pipeline"],["5–8","Expand to 25–30 tests covering all critical paths","Manual regression load drops noticeably"],["Ongoing","Add 3–5 new tests per sprint, maintain existing","Sustainable growth without maintenance debt"]]}}],quiz:{question:"Your team wants to automate a test for a feature that is actively being redesigned and will change significantly next sprint. What should you do?",options:["Automate it now so testing is covered during the redesign","Wait until the feature stabilizes — automating now creates maintenance debt","Automate it but skip assertions so it doesn't break","Ask a developer to handle it since it's complicated"],correctIndex:1,explanation:"Automating unstable features creates tests that break every time the feature changes. This wastes more time maintaining the test than running it manually. Wait until the feature is stable, then automate. Use manual/exploratory testing during the redesign phase."}},{id:1,title:"Why Playwright + Copilot",subtitle:"Understanding the productivity multiplier",icon:"🚀",audience:"All Roles",sections:[{heading:"The Testing Bottleneck",content:"Test automation is consistently the top bottleneck in delivery. Not because testing is hard — but because writing test code is slow, maintaining it is tedious, and most test frameworks fight you with flaky behavior. Playwright solves the execution side (reliable, fast, multi-browser). Copilot solves the authoring side (describe what you want, get working code). Together, they compress the create → run → maintain cycle dramatically."},{heading:"Playwright vs. Alternatives",content:"Playwright was built by the team behind Puppeteer at Microsoft. It addresses the core pain points of Selenium (flaky waits, browser driver management) and Cypress (single-browser limitation, no multi-tab). Key differentiator: auto-wait. Playwright automatically waits for elements to be ready before interacting, eliminating the single biggest source of flaky tests.",table:{headers:["Capability","Selenium","Cypress","Playwright"],rows:[["Auto-wait","❌ Manual sleeps","⚠️ Partial","✅ Built-in"],["Multi-browser","✅ Config-heavy","❌ Chromium-focused","✅ One API"],["Parallel execution","⚠️ Grid required","❌ Serial default","✅ Native"],["Network interception","❌","✅","✅"],["Built-in recorder","❌","⚠️ Limited","✅ Full codegen"],["Trace viewer","❌","⚠️ Screenshots","✅ Time-travel debug"]]}},{heading:"The Copilot Multiplier",content:"Copilot doesn't replace testers — it removes the mechanical translation step between 'I know what to test' and 'I have working test code.' The shift: you stop writing tests character-by-character and start describing what needs testing in structured English.",table:{headers:["Phase","Without Copilot","With Copilot"],rows:[["Scaffolding","30–60 min manual","5–10 min prompted"],["Selector authoring","Trial & error in DevTools","Context-aware suggestions"],["Edge case coverage","Developer-dependent","Copilot surfaces common gaps"],["Debugging failures","Manual trace reading","Copilot explains stack traces"],["Test maintenance","High (brittle selectors)","Stable locator patterns"]]}},{heading:"The Governance Boundary",content:"Copilot generates code. It does NOT validate business logic. Every generated test must be reviewed against acceptance criteria before merge. This is the same human-in-the-loop standard we apply across all AI-augmented development.",warning:"Never merge Copilot-generated tests without validating: correct assertions, realistic test data, no hardcoded waits, and alignment with the acceptance criteria on the ticket."}],quiz:{question:"What is Playwright's primary advantage over Selenium for test reliability?",options:["It uses JavaScript instead of Java","Built-in auto-wait eliminates manual sleep() calls","It only runs in Chrome so there's less to configure","It doesn't require any selectors"],correctIndex:1,explanation:"Playwright's auto-wait mechanism automatically waits for elements to be actionable before interacting, eliminating the most common source of flaky Selenium tests."}},{id:2,title:"Environment Setup",subtitle:"Getting your local dev environment ready",icon:"⚙️",audience:"All Roles",sections:[{heading:"Prerequisites",content:"You need Node.js 18+, VS Code, and three extensions. If you're a non-coder, ask a developer to walk through the initial npm install with you the first time. After setup, you won't need to touch the command line often — the VS Code extension handles most interactions.",code:`# Check your Node version (must be 18+)
node --version

# Create Playwright project in your repo
npm init playwright@latest

# When prompted, select:
#   Language: TypeScript
#   Test folder: e2e/
#   GitHub Actions: Yes
#   Install browsers: Yes`,codeLanguage:"bash",tip:"Non-coders: You only run this once per project. After initial setup, you'll primarily use the VS Code GUI — not the terminal."},{heading:"VS Code Extensions",content:"Install these three extensions from the VS Code marketplace. The Playwright extension gives you a sidebar with a 'Record new' button — this is your primary entry point as a non-coder.",code:`# Search in VS Code Extensions panel (Ctrl+Shift+X):
ms-playwright.playwright        # Playwright Test for VS Code
GitHub.copilot                   # GitHub Copilot
GitHub.copilot-chat              # GitHub Copilot Chat`,codeLanguage:"text"},{heading:"Project Configuration",content:"The playwright.config.ts file controls which browsers to test, where your app runs, and how failures are recorded. Here's a production config. Non-coders: you rarely edit this directly — but understanding what it does helps you read test results.",code:`// playwright.config.ts
import { defineConfig, devices } from '@playwright/test';

export default defineConfig({
testDir: './e2e',
fullyParallel: true,
forbidOnly: !!process.env.CI,
retries: process.env.CI ? 2 : 0,
reporter: [['html'], ['junit', { outputFile: 'results.xml' }]],
use: {
  baseURL: process.env.BASE_URL || 'http://localhost:3000',
  trace: 'on-first-retry',
  screenshot: 'only-on-failure',
},
projects: [
  { name: 'chromium', use: { ...devices['Desktop Chrome'] } },
  { name: 'firefox',  use: { ...devices['Desktop Firefox'] } },
  { name: 'webkit',   use: { ...devices['Desktop Safari'] } },
],
});`,codeLanguage:"typescript"},{heading:"Team Copilot Instructions",content:"This is the highest-leverage Copilot investment. A .github/copilot-instructions.md file in your repo root teaches Copilot your team's testing conventions. Every developer and non-coder gets the same guardrails automatically.",code:`<!-- .github/copilot-instructions.md -->
# Testing Conventions
- Use Playwright Test (@playwright/test) for all E2E tests
- Follow Page Object Model pattern (see e2e/pages/)
- Use data-testid attributes for selectors, not CSS classes
- Include at least one assertion per user action
- Never use page.waitForTimeout() \u{2014} rely on auto-wait
- Tests must be independent \u{2014} no shared state between tests
- Use test fixtures for authentication setup`,codeLanguage:"markdown",tip:"This file shapes every Copilot suggestion project-wide. A 10-minute investment that pays off on every test written afterward."}],exercise:{title:"Spot the Config Issue",description:"This config has a common mistake. Can you identify and fix it?",starterCode:`import { defineConfig, devices } from '@playwright/test';

export default defineConfig({
testDir: './e2e',
use: {
  baseURL: 'http://localhost:3000',
  trace: 'on-first-retry',
},
projects: [
  {
    name: 'chromium',
    use: { ...devices['Desktop Chrome'] },
  },
],
// Problem: tests depend on dev server but it's not configured
// How do you tell Playwright to start the server automatically?
});`,solutionCode:`import { defineConfig, devices } from '@playwright/test';

export default defineConfig({
testDir: './e2e',
use: {
  baseURL: 'http://localhost:3000',
  trace: 'on-first-retry',
},
projects: [
  {
    name: 'chromium',
    use: { ...devices['Desktop Chrome'] },
  },
],
webServer: {
  command: 'npm run dev',
  port: 3000,
  reuseExistingServer: !process.env.CI,
},
});`,hints:["The webServer config object tells Playwright how to start your app","You need command (how to start), port (where to find it), and reuseExistingServer"]}},{id:3,title:"Copilot Prompt Engineering",subtitle:"Structured prompts that produce reviewable tests",icon:"💬",audience:"All Roles",sections:[{heading:"The CARD Formula",content:"For any feature, structure your Copilot Chat prompt with four parts: Context (what page or component), Actions (the user flow — steps the user takes), Rules (business requirements and validation logic), Data (test data, edge cases, and boundary conditions). This maps directly to acceptance criteria on tickets and produces tests a reviewer can trace back to the story.",code:`// Example CARD prompt in Copilot Chat:

// CONTEXT: Login page with email + password form
// ACTIONS: Enter wrong password \u{2192} see error \u{2192} retry with correct \u{2192} land on dashboard
// RULES: Show error on invalid credentials, lock account after 5 failed attempts
// DATA: testuser@example.com, wrong password "badpass", correct password "Passw0rd!"
//
// Generate a Playwright test for this flow using data-testid selectors.`,codeLanguage:"typescript",callout:"Non-coders: This is your most important skill. You don't need to understand the generated code perfectly — you need to write great prompts. The CARD formula turns your domain knowledge into test specifications."},{heading:"Inline Comment Triggers",content:"In the editor, write a descriptive comment above an empty test block. Copilot auto-completes the code based on your description. The more specific your comment, the better the output.",code:`// Test: user sees validation error when submitting empty login form
// Selectors: data-testid="email-input", "password-input", "login-btn", "error-msg"
// Expected: error message contains "Email is required"
test('shows validation on empty submit', async ({ page }) => {
// Copilot auto-completes from here \u{2193}
});`,codeLanguage:"typescript",tip:"Always mention the selector strategy (data-testid) and expected text in your comment. Copilot uses these as constraints."},{heading:"Chat Commands Quick Reference",content:"VS Code Copilot Chat has slash commands purpose-built for testing workflows. These are faster than freeform prompts for specific tasks.",table:{headers:["Command","When To Use","Example"],rows:[["/tests","Generate tests for open file","Open login.ts → /tests"],["/fix","Diagnose a failing test","Paste error → /fix"],["/explain","Understand unfamiliar code","Select test block → /explain"],["@workspace","Project-wide test generation","@workspace generate auth tests"],["#file:path","Reference specific file for context","#file:LoginPage.ts write tests"]]}},{heading:"The Assertion Trap",content:"Copilot will generate syntactically valid assertions that test the wrong thing. It doesn't know your business rules. Always verify: Is this asserting what the acceptance criteria requires? Or just what the page happens to show?",warning:"Anti-pattern: 'Copilot, what should this test assert?' → It guesses.\nCorrect: 'Assert that after 5 failed logins, the user sees: Account locked. Contact support.' → Specific, verifiable."}],quiz:{question:"In the CARD prompt formula, what does the 'A' stand for?",options:["Assertions","Actions — the user flow steps","Accessibility checks","API endpoints"],correctIndex:1,explanation:"CARD = Context, Actions, Rules, Data. Actions describes the step-by-step user flow the test should walk through — this is the sequence Playwright will automate."}},{id:4,title:"Record → Refine Workflow",subtitle:"The fastest path from zero to production test",icon:"🎬",audience:"All Roles — Non-Coder Primary Path",sections:[{heading:"Why Record-First?",content:"Recording is the recommended onramp for everyone, especially non-coders. You interact with the app normally — Playwright writes the test code. Then Copilot refines that code into something maintainable. You never start from a blank file.",callout:"This is the non-coder golden path. Record → Copilot Refine → Review → Merge. You can contribute real test coverage from day one."},{heading:"Step 1: Launch the Recorder",content:"Use either the terminal command or the VS Code GUI button. The recorder opens a browser window where every click, type, and navigation is captured as test code in real time.",code:`# Terminal approach
npx playwright codegen http://localhost:3000

# With mobile emulation
npx playwright codegen --device="iPhone 14" http://localhost:3000

# VS Code approach (preferred):
# 1. Open Test Explorer sidebar (beaker icon)
# 2. Click "Record new" button
# 3. Interact with your app
# 4. Code appears in editor automatically`,codeLanguage:"bash",tip:"VS Code recorder is preferred — the generated code appears directly in your editor and is easier to save into the right test file."},{heading:"Step 2: Refine with Copilot",content:"Raw recordings use auto-generated selectors that break easily. Select the recorded code, open Copilot Chat (Ctrl+I or Cmd+I), and use one of these refine prompts to upgrade it.",code:`// Copilot Chat prompt \u{2014} paste after selecting recorded code:

"Refine this recorded Playwright test:
1. Replace auto-generated selectors with data-testid attributes
2. Add meaningful assertions after each action
3. Extract page interactions into a Page Object class
4. Add descriptive test name and comments
5. Remove any waitForTimeout calls"`,codeLanguage:"typescript"},{heading:"Step 3: Add Assertions",content:"A recorded test only captures actions (click, type, navigate). It does NOT capture expected results. You must add assertions — this is the human judgment Copilot can't provide. Use this prompt pattern:",code:`// After recording a checkout flow, ask Copilot:

"Add assertions to verify:
- Cart total updates when quantity changes
- Shipping form shows validation on empty required fields
- Order confirmation page displays the order number
- User receives a success message containing 'Thank you'"`,codeLanguage:"typescript",warning:"A test without assertions is just a demo. It proves the app doesn't crash — not that it works correctly. Always add at least one assertion per user action."},{heading:"Step 4: Save and Run",content:"Save the refined test file in your e2e/ folder. Run it from VS Code's Test Explorer (green play button) or from the terminal. Check the HTML report for results.",code:`# Run all tests
npx playwright test

# Run a specific test file
npx playwright test e2e/login.spec.ts

# Run with headed browser (watch it execute)
npx playwright test --headed

# View the HTML report
npx playwright show-report`,codeLanguage:"bash",tip:"Non-coders: Run with --headed the first few times so you can watch the browser execute your test. It builds confidence and helps you spot incorrect flows."}],exercise:{title:"Refine a Raw Recording",description:"This is raw recorded code from Playwright codegen. Write a Copilot Chat prompt that would refine it into a production-quality test.",starterCode:`// Raw recorded test \u{2014} needs refinement
test('test', async ({ page }) => {
await page.goto('http://localhost:3000/login');
await page.locator('#root > div > form > input:nth-child(1)').fill('user@test.com');
await page.locator('#root > div > form > input:nth-child(2)').fill('password123');
await page.locator('#root > div > form > button').click();
await page.waitForURL('**/dashboard');
});

// YOUR TASK: Write the Copilot Chat prompt you would use
// to refine this into a maintainable, assertion-rich test.
// Write your prompt as a comment below:

// PROMPT: "`,solutionCode:`// Suggested Copilot Chat prompt:

// PROMPT: "Refine this recorded Playwright test:
// 1. Replace CSS nth-child selectors with data-testid locators
//    (email-input, password-input, login-button)
// 2. Add a descriptive test name: 'successful login redirects to dashboard'
// 3. Add assertions:
//    - Login page loads (heading visible)
//    - After login, dashboard URL is reached
//    - Dashboard shows welcome message with user's name
// 4. Remove implicit waits, rely on Playwright auto-wait
// 5. Extract locators into a LoginPage class if possible"`,hints:["Focus on replacing the fragile CSS selectors first — that's the biggest reliability win","Every click or navigation should have an assertion that verifies the expected outcome","Mention the specific data-testid names so Copilot uses them"]}},{id:5,title:"Writing Tests from Scratch",subtitle:"From acceptance criteria to working test code",icon:"✍️",audience:"Developers — Non-coders: skim for awareness",sections:[{heading:"From Ticket to Test",content:"Every test should trace back to an acceptance criterion. Start with the ticket, extract the testable behaviors, and use Copilot to scaffold each one. This workflow ensures full coverage and makes reviews faster because reviewers can map each test to a requirement.",code:`// Given this acceptance criteria from a ticket:
// AC1: User can search by product name
// AC2: Results show product name, price, and thumbnail
// AC3: No results shows "No products found" message
// AC4: Search is case-insensitive

// Copilot Chat prompt:
"Generate Playwright tests for a product search page.
Use data-testid selectors. One test per acceptance criterion:
- AC1: Search by name returns matching results
- AC2: Each result shows name, price, thumbnail
- AC3: Nonsense query shows 'No products found'
- AC4: 'WIDGET' and 'widget' return same results
Base URL: /products/search
Test data: search for 'Widget Pro'"`,codeLanguage:"typescript"},{heading:"Test Anatomy",content:"Every Playwright test follows the Arrange → Act → Assert pattern. Understanding this structure helps you review Copilot output, even if you didn't write it.",code:`import { test, expect } from '@playwright/test';

test('search returns matching products', async ({ page }) => {
// ARRANGE \u{2014} set up the starting state
await page.goto('/products/search');

// ACT \u{2014} perform the user action
await page.getByTestId('search-input').fill('Widget Pro');
await page.getByTestId('search-button').click();

// ASSERT \u{2014} verify the expected outcome
const results = page.getByTestId('product-card');
await expect(results).toHaveCount(3);
await expect(results.first()).toContainText('Widget Pro');
});`,codeLanguage:"typescript",tip:"Non-coders: When reviewing tests, look for these three sections. If a test has Arrange + Act but no Assert — flag it. That's the #1 review catch."},{heading:"Selector Strategy",content:"The single most impactful decision for test maintainability. Data-testid attributes are immune to CSS refactors and content changes. The team standard is: always use data-testid for test selectors.",table:{headers:["Strategy","Example","Resilience","Use When"],rows:[["data-testid","getByTestId('login-btn')","🟢 Excellent","Always — team default"],["Role + name","getByRole('button', { name: 'Log in' })","🟢 Good","Accessibility-first flows"],["Text content","getByText('Submit')","🟡 Medium","Labels unlikely to change"],["CSS selector","locator('.btn-primary')","🔴 Fragile","Last resort only"]]},warning:"If you see CSS selectors like .btn-primary or #main > div:nth-child(3) in a test — flag it in review. These break on any UI refactor."}],quiz:{question:"What's the recommended selector strategy for the team?",options:["CSS class selectors for readability","XPath for precision","data-testid attributes","Auto-generated selectors from the recorder"],correctIndex:2,explanation:"data-testid attributes are the team standard because they are immune to CSS refactors, content text changes, and layout restructuring. They exist solely for testing and won't break when designers restyle the UI."}},{id:6,title:"Page Object Model",subtitle:"Organizing tests for long-term maintainability",icon:"🏗️",audience:"Developers — Non-coders: awareness only",sections:[{heading:"Why POM?",content:"Page Object Model encapsulates page interactions into reusable classes. When the UI changes, you update one class instead of every test that touches that page. Think of it as a contract: 'This page exposes these actions and these elements.'"},{heading:"POM Structure",content:"Each page gets a class. Locators are defined once. Actions become methods. Tests read like user stories.",code:`// e2e/pages/LoginPage.ts
import { Page, Locator } from '@playwright/test';

export class LoginPage {
readonly page: Page;
readonly emailInput: Locator;
readonly passwordInput: Locator;
readonly loginButton: Locator;
readonly errorMessage: Locator;

constructor(page: Page) {
  this.page = page;
  this.emailInput = page.getByTestId('email-input');
  this.passwordInput = page.getByTestId('password-input');
  this.loginButton = page.getByTestId('login-button');
  this.errorMessage = page.getByTestId('error-message');
}

async goto() {
  await this.page.goto('/login');
}

async login(email: string, password: string) {
  await this.emailInput.fill(email);
  await this.passwordInput.fill(password);
  await this.loginButton.click();
}
}`,codeLanguage:"typescript"},{heading:"Copilot POM Generation",content:"Use Copilot Chat to generate entire Page Objects from a description of the page. This is one of the highest-value Copilot use cases.",code:`// Copilot Chat prompt:
"Generate a Playwright Page Object Model class for a
product checkout page with these elements:
- Cart items list (data-testid='cart-items')
- Quantity inputs per item (data-testid='qty-{id}')
- Remove buttons per item (data-testid='remove-{id}')
- Subtotal display (data-testid='subtotal')
- Checkout button (data-testid='checkout-btn')
- Promo code input and apply button

Include methods: updateQuantity, removeItem, applyPromo,
getSubtotal, proceedToCheckout"`,codeLanguage:"typescript",tip:"List every data-testid in the prompt. Copilot can't see your HTML, so you must provide the selectors explicitly."}]},{id:7,title:"API & Network Testing",subtitle:"Testing beyond the UI",icon:"🌐",audience:"Developers",sections:[{heading:"API Testing with Playwright",content:"Playwright has a built-in API testing client — no Postman or separate tool required. Use request context for API-only tests, or intercept network calls during UI tests.",code:`import { test, expect } from '@playwright/test';

test('GET /api/products returns 200 with products', async ({ request }) => {
const response = await request.get('/api/products');
expect(response.status()).toBe(200);

const body = await response.json();
expect(body.products).toBeDefined();
expect(body.products.length).toBeGreaterThan(0);
expect(body.products[0]).toHaveProperty('name');
expect(body.products[0]).toHaveProperty('price');
});

test('POST /api/orders requires auth', async ({ request }) => {
const response = await request.post('/api/orders', {
  data: { productId: '123', quantity: 1 }
});
expect(response.status()).toBe(401);
});`,codeLanguage:"typescript"},{heading:"Network Interception (Mocking)",content:"Mock API responses to test UI behavior under specific conditions — slow responses, errors, empty data — without needing a real backend.",code:`test('shows error banner on server failure', async ({ page }) => {
// Intercept the API call and return a 500
await page.route('**/api/products', (route) => {
  route.fulfill({
    status: 500,
    body: JSON.stringify({ error: 'Internal Server Error' }),
  });
});

await page.goto('/products');
await expect(page.getByTestId('error-banner')).toBeVisible();
await expect(page.getByTestId('error-banner'))
  .toContainText('Something went wrong');
});`,codeLanguage:"typescript",tip:"Mocking is how you test error states, loading states, and empty states without breaking your backend. Essential for edge case coverage."}]},{id:8,title:"Prompt Template Library",subtitle:"Copy-paste prompts for every testing scenario",icon:"📋",audience:"All Roles — Non-Coder Essential",sections:[{heading:"How to Use These Templates",content:"These are ready-to-paste prompts for Copilot Chat. Replace the [BRACKETED] placeholders with your specific details. Each template produces a complete, reviewable test. Non-coders: this is your primary tool. You don't need to write code — you need to fill in templates accurately.",callout:"Tip: Save your most-used customized prompts in a personal snippets file. Build a library of templates for your project's specific pages."},{heading:"Template Categories",content:"Templates are organized by testing scenario. Each includes the Copilot Chat prompt and notes on what to verify in the output."}],promptTemplates:[{label:"🔐 Login / Authentication Flow",prompt:`Generate a Playwright test for [PAGE_NAME] authentication:

CONTEXT: [Describe the login form \u{2014} fields, OAuth buttons, remember me, etc.]
USER FLOW:
1. Navigate to [URL_PATH]
2. Enter [TEST_EMAIL] and [TEST_PASSWORD]
3. Click login button
4. Verify redirect to [EXPECTED_DESTINATION]

ASSERTIONS TO INCLUDE:
- Login page loads with all form elements visible
- Error message appears for invalid credentials: "[EXPECTED_ERROR_TEXT]"
- Successful login redirects to [DESTINATION_URL]
- User's name or avatar appears in header after login

Use data-testid selectors. Follow Page Object Model pattern.`,context:"Use for any login, signup, or authentication page. Replace bracketed items with your actual page details."},{label:"📝 Form Submission + Validation",prompt:`Generate Playwright tests for a [FORM_TYPE] form at [URL_PATH]:

FORM FIELDS:
[List each field: name, type, required?, validation rules]
Example:
- Email (text, required, must be valid email format)
- Phone (text, optional, must match xxx-xxx-xxxx)
- State (dropdown, required)
- Terms checkbox (required)

TEST CASES TO GENERATE:
1. Happy path: fill all fields correctly \u{2192} submit \u{2192} verify success message
2. Required field validation: submit empty \u{2192} verify each error message
3. Format validation: enter invalid email \u{2192} verify format error
4. Optional fields: submit without optional fields \u{2192} still succeeds

Use data-testid="[field-name]-input" and data-testid="[field-name]-error" pattern.`,context:"Works for any form — registration, contact, application, profile edit. List every field and its rules for best results."},{label:"🔍 Search + Filter + Results",prompt:`Generate Playwright tests for search functionality at [URL_PATH]:

SEARCH BEHAVIOR:
- Input: data-testid="search-input"
- Submit: data-testid="search-button" OR Enter key
- Results container: data-testid="results-list"
- Individual result: data-testid="result-card"
- No results message: data-testid="no-results"

TEST CASES:
1. Valid search "[SEARCH_TERM]" returns [EXPECTED_COUNT] results
2. Each result displays [REQUIRED_FIELDS: name, price, image, etc.]
3. Empty/whitespace search shows [EXPECTED_BEHAVIOR]
4. No-match search "[GIBBERISH_TERM]" shows "No results found"
5. Search is case-insensitive
[6. Filters: if applicable, describe filter controls and expected behavior]`,context:"Adapt for product search, user directory, document search, etc. Add filter-specific tests if the page has filter controls."},{label:"🛒 Multi-Step Workflow (Checkout, Wizard)",prompt:`Generate Playwright tests for a multi-step [WORKFLOW_TYPE] at [URL_PATH]:

STEPS:
1. [Step 1 name]: [What user does] \u{2192} [What they should see]
2. [Step 2 name]: [What user does] \u{2192} [What they should see]
3. [Step 3 name]: [What user does] \u{2192} [What they should see]
4. Confirmation: [Final expected state]

NAVIGATION RULES:
- Back button returns to previous step with data preserved
- Direct URL access to step 3 redirects to step 1
- Progress indicator shows current step

ASSERTIONS PER STEP:
- Step heading matches expected text
- Required fields from previous step are preserved
- Form validation prevents advancing without required data
- Final confirmation shows summary of all entered data

Use data-testid="step-[N]-heading", "next-button", "back-button" pattern.`,context:"For checkout flows, onboarding wizards, multi-page forms. Define each step clearly — Copilot can't infer your workflow."},{label:"📊 Table / Data Grid",prompt:`Generate Playwright tests for a data table at [URL_PATH]:

TABLE STRUCTURE:
- Table: data-testid="data-table"
- Rows: data-testid="table-row"
- Headers: [List column names]
- Sortable columns: [Which ones]
- Pagination: data-testid="pagination" (if applicable)

TEST CASES:
1. Table loads with [EXPECTED_ROW_COUNT] rows
2. Column headers match: [HEADER_LIST]
3. Sort by [COLUMN] ascending/descending works
4. Pagination: page 2 shows different rows
5. Empty state: when no data, shows "[EMPTY_MESSAGE]"
[6. Row actions: click row \u{2192} navigates to detail page]
[7. Inline edit: double-click cell \u{2192} edit \u{2192} save]`,context:"For admin dashboards, report views, user management tables. Include pagination and sort tests only if the table supports them."},{label:"♿ Accessibility Quick Check",prompt:`Generate a Playwright accessibility test for [PAGE_NAME] at [URL_PATH]:

CHECKS TO INCLUDE:
1. All images have alt text (non-empty alt attribute)
2. Form inputs have associated labels (aria-label or <label for>)
3. Page has exactly one h1 element
4. Tab order follows visual reading order (tab through interactive elements)
5. Focus indicators are visible on keyboard navigation
6. Color contrast: use @axe-core/playwright to run automated scan
7. ARIA landmarks: main, nav, footer regions exist

Include the axe-core import:
import AxeBuilder from '@axe-core/playwright';

Run axe scan and assert zero violations.`,context:"Run this on every page. Required for 508 compliance in federal delivery. Add page-specific checks as needed."},{label:"⚡ Refine a Recorded Test",prompt:`Refine this recorded Playwright test into production quality:

[PASTE RECORDED CODE HERE]

REFINEMENTS:
1. Replace auto-generated CSS/nth-child selectors with data-testid locators
2. Add a descriptive test name that explains the user scenario
3. Add assertions after each meaningful action:
 - Page/section is visible after navigation
 - Form values are reflected after input
 - Expected result appears after submission
4. Remove any page.waitForTimeout() calls
5. Add comments explaining each test section (Arrange / Act / Assert)
6. Extract repeated interactions into a Page Object if 3+ tests share the page`,context:"Non-coders: This is your go-to after every recording session. Paste the raw code and this prompt into Copilot Chat to get a clean, reviewable test."},{label:"🐛 Debug a Failing Test",prompt:`This Playwright test is failing. Help me diagnose and fix it:

TEST CODE:
[PASTE TEST CODE]

ERROR MESSAGE:
[PASTE ERROR OUTPUT]

QUESTIONS TO ANSWER:
1. What is the root cause of the failure?
2. Is this a test bug or an app bug?
3. If test bug: what's the fix?
4. If app bug: what should I report to the developer?
5. Are there any flaky patterns in this test that should be addressed?`,context:"Non-coders: Use this when a test fails and you're not sure why. The structured questions help Copilot give you an actionable diagnosis."}],quiz:{question:"When using a prompt template, what do [BRACKETED] items represent?",options:["Code syntax that Copilot auto-generates","Placeholders you replace with your specific project details","Optional items you can delete","Error messages to watch for"],correctIndex:1,explanation:"Bracketed items are placeholders. Replace them with your actual page names, URLs, test data, and expected behaviors. The quality of the generated test depends on the specificity of your replacements."}},{id:9,title:"Reading Test Results",subtitle:"Understanding what passed, what failed, and why",icon:"📊",audience:"All Roles — Non-Coder Essential",sections:[{heading:"The HTML Report",content:"After every test run, Playwright generates an HTML report. Open it with 'npx playwright show-report'. This shows every test: green for pass, red for fail, with screenshots and traces attached to failures.",code:`# Run tests and open report
npx playwright test
npx playwright show-report

# Report shows:
# \u{2705} 12 passed
# \u{274C} 2 failed
# \u{23ED} 1 skipped
# Click any failed test to see: screenshot, trace, error message`,codeLanguage:"bash"},{heading:"Reading Error Messages",content:"Playwright errors follow a consistent pattern. Learn to read them and you can diagnose 80% of failures without touching code.",table:{headers:["Error Pattern","Meaning","Likely Cause"],rows:[["locator.click: Target closed","Page navigated away or closed","Test is too fast, or URL changed"],["expect(locator).toBeVisible — timeout","Element never appeared on page","Wrong selector, or page didn't load"],["expect(received).toBe(expected)","Value mismatch","App returned different data than expected"],["page.goto: net::ERR_CONNECTION_REFUSED","App server not running","Start dev server before running tests"],["strict mode violation: locator matched 3 elements","Selector is too broad","Make selector more specific (add text filter)"]]},tip:"Non-coders: You don't need to fix every error. Your job is to identify whether it's a test problem (wrong selector) or an app problem (feature is broken) and route it to the right person."},{heading:"The Trace Viewer",content:"Playwright's trace viewer is a time-travel debugger. It records every action, network request, and DOM snapshot. When a test fails, the trace shows you exactly what the app looked like at each step.",code:`# View trace from a failed test
npx playwright show-trace test-results/[test-folder]/trace.zip

# Trace viewer shows:
# Timeline: every action plotted on a timeline
# Snapshots: DOM state before/after each action
# Network: every API call with request/response
# Console: browser console logs and errors`,codeLanguage:"bash",callout:"The trace viewer is the single most powerful debugging tool. Before asking a developer for help with a failure, open the trace and screenshot the step where things go wrong."}],quiz:{question:"A test fails with 'expect(locator).toBeVisible — timeout'. What's the most likely cause?",options:["The test data is wrong","The network is slow","The element selector doesn't match anything on the page","Playwright has a bug"],correctIndex:2,explanation:"A toBeVisible timeout means Playwright waited for an element to appear and it never did. The most likely cause is a wrong selector — the data-testid doesn't match the actual attribute in the HTML, or the element genuinely isn't rendered."}},{id:10,title:"HITL Review Checklist",subtitle:"The governance gate before any test merges",icon:"✅",audience:"All Roles",sections:[{heading:"Why a Checklist?",content:"AI-generated code passes syntax checks and even runs successfully — but it can still be wrong. A test that clicks buttons without asserting outcomes, or asserts the wrong thing, gives false confidence. This checklist is the team's quality gate.",callout:"This checklist applies to ALL test code entering the repo — whether hand-written, recorded, or Copilot-generated. No exceptions."},{heading:"The Review Checklist",content:"Run through these items before approving any test MR. Each item is a yes/no gate. Any 'No' requires a fix before merge.",table:{headers:["#","Check","Why It Matters"],rows:[["1","Does each test map to an acceptance criterion?","Untraceable tests become orphaned and unmaintainable"],["2","Does every user action have a corresponding assertion?","Actions without assertions only prove 'no crash' — not correctness"],["3","Are all selectors using data-testid or getByRole?","CSS selectors break on every UI refactor"],["4","Zero instances of waitForTimeout or sleep?","Hardcoded waits are the #1 source of flaky tests"],["5","Does the test use realistic (not mocked) data for happy path?","Mocked happy paths miss integration bugs"],["6","Are error/edge cases covered (empty state, 500, timeout)?","Edge cases are where production bugs hide"],["7","Is test data independent (no shared state between tests)?","Shared state creates hidden ordering dependencies"],["8","Does the test name describe the user scenario?","test('test 1') tells reviewers nothing"],["9","No hardcoded URLs or environment-specific values?","Tests must run against any environment via baseURL"],["10","No sensitive data (real passwords, PII, tokens)?","Test code is committed to the repo and visible to the team"]]}},{heading:"Copilot-Specific Red Flags",content:"These are patterns that Copilot frequently generates that should be caught in review.",table:{headers:["Red Flag","What Copilot Did","Correct Fix"],rows:[["Assertion-free test","Generated clicks with no expect()","Add assertion per action"],["Hardcoded wait","Added page.waitForTimeout(3000)","Remove — rely on auto-wait"],["Hallucinated selector","Used data-testid that doesn't exist","Verify against actual HTML"],["Wrong assertion target","Asserts page title instead of error msg","Match assertion to AC"],["Shared state","Test 2 depends on Test 1's data","Add setup/teardown per test"],["Magic strings","Hardcoded 'localhost:3000' in goto()","Use baseURL from config"]]},warning:"The hallucinated selector is the most dangerous pattern. Copilot will confidently use a data-testid that doesn't exist in your HTML. The test fails with a timeout, and the error doesn't tell you the selector is wrong — only that the element wasn't found."}],quiz:{question:"A Copilot-generated test passes but has no expect() assertions. What should you do?",options:["Approve it — if it passes, it works","Add assertions that verify the acceptance criteria before approving","Delete it and write the test manually","Ask Copilot to add assertions automatically without reviewing them"],correctIndex:1,explanation:"A test without assertions only proves the app doesn't crash during the flow — not that it produces correct results. Add assertions that map to the ticket's acceptance criteria, then verify those assertions are checking the right things."}},{id:11,title:"Non-Coder Survival Guide",subtitle:"Practical tips for testers who don't code daily",icon:"🎯",audience:"Non-Coder Essential",sections:[{heading:"Your Superpower: Domain Knowledge",content:"You know the business rules better than any developer on the team. You know the edge cases users hit. You know which flows break in production. That knowledge is MORE valuable than coding skill for test quality. Your job is to specify WHAT to test — Copilot + Playwright handle HOW to test it.",callout:"The best test suite isn't the one with the most code — it's the one that catches the most real bugs. That comes from domain knowledge, not programming skill."},{heading:"The 5-Minute Workflow",content:"This is your daily routine for contributing tests. It takes about 5 minutes per test flow once you're comfortable.",table:{headers:["Step","Time","Tool","Your Action"],rows:[["1. Read the ticket","1 min","Jira/ADO","Identify the acceptance criteria to test"],["2. Record the flow","2 min","VS Code Recorder","Click through the app normally"],["3. Refine with Copilot","1 min","Copilot Chat","Paste the 'Refine' prompt template"],["4. Add assertions","1 min","Copilot Chat","Tell Copilot what to verify (from the AC)"],["5. Run and commit","1 min","VS Code / Terminal","Green = commit. Red = diagnose or escalate"]]}},{heading:"When to Escalate to a Developer",content:"You don't need to solve everything. Here's your decision tree for when to escalate.",table:{headers:["Situation","Your Action"],rows:[["Test fails — wrong selector","Try the debug prompt template. If stuck after 5 min, escalate."],["Test needs auth/fixture setup","Escalate — fixture configuration is developer territory."],["Need to mock an API response","Escalate — network interception requires code understanding."],["Copilot generates confusing code","Use /explain command first. If still unclear, escalate."],["Test passes but you're unsure it's correct","ALWAYS escalate — false confidence is worse than no test."],["Need to test a flow across multiple pages","Record it as one flow. If it breaks, escalate for POM refactoring."]]},tip:"Escalating is a sign of good judgment, not weakness. Better to ask for help than merge a bad test."},{heading:"Common Gotchas for Non-Coders",content:"These are the mistakes we see most often from people new to test automation.",table:{headers:["Gotcha","What Happens","Prevention"],rows:[["Forgetting to start the app","All tests fail with connection refused","Run 'npm run dev' first or configure webServer in config"],["Editing the wrong file","Your changes don't appear in test runs","Always work in e2e/ folder — check file path"],["Trusting Copilot assertions blindly","Tests pass but check the wrong thing","Compare every assertion to the ticket's AC"],["Not pulling latest code","Tests fail because app changed","Always git pull before recording"],["Recording on wrong environment","Tests have wrong URLs baked in","Record against localhost, use baseURL config"]]}},{heading:"Your First Week Plan",content:"Follow this progression. Each day builds on the previous.",table:{headers:["Day","Goal","Lesson Reference"],rows:[["Mon","Complete environment setup + run example tests","Lessons 2–4"],["Tue","Record 3 simple flows (login, search, nav)","Lesson 6"],["Wed","Refine recordings with Copilot prompt templates","Lessons 5–6, 10"],["Thu","Add assertions and submit first test MR","Lessons 7, 12"],["Fri","Review someone else's test using HITL checklist","Lesson 12"]]}},{heading:"Vocabulary Cheat Sheet",content:"Terms you'll encounter in test reviews and stand-ups. Knowing the vocabulary makes you a more effective participant even before you're comfortable with the code.",table:{headers:["Term","Plain English Meaning"],rows:[["Assertion / expect()","A check that verifies something is correct — 'I expect this text to say Welcome'"],["Selector / Locator","How the test finds an element on the page — like an address for a button or input field"],["data-testid","A special HTML tag added specifically for tests to find elements reliably"],["Fixture","Pre-made setup that runs before a test — like logging in automatically so every test doesn't repeat login"],["Page Object Model (POM)","Organizing test code so each page has its own file with all its buttons and actions defined once"],["Flaky test","A test that sometimes passes and sometimes fails with no code change — usually a timing or selector problem"],["Headless / Headed","Headless = browser runs invisibly (fast). Headed = you can see the browser window (useful for debugging)"],["Trace","A recording of everything the browser did during a test — screenshots, network calls, DOM at each step"],["CI/CD Pipeline","Automatic system that runs tests every time code is submitted — you don't have to remember to run them"],["Regression test","A test that checks existing features still work after new changes — the core use case for automation"]]}},{heading:"The Automation Paradox: Why You're Already Ahead",content:"Industry research reveals an irony: the hardest skills in automation aren't programming — they're testing skills that manual testers already have. Knowing what to test, how to design meaningful scenarios, recognizing when something 'feels wrong,' understanding how system components affect each other, and triaging whether a failure is a real bug or a test environment issue. Developers learning automation often struggle with exactly these skills because they think like builders, not breakers. Your testing mindset is the foundation that makes automation valuable — without it, you just have scripts that click buttons and check nothing meaningful.",callout:"A developer who can code but can't think like a tester writes automation that misses real bugs. A manual tester who can think but is learning to code writes automation that catches real bugs. Invest in yourself — the hard part is already done."}],quiz:{question:"A non-coder records a test, refines it with Copilot, and it passes. What's the critical next step before committing?",options:["Run it again to make sure","Verify every assertion maps to an acceptance criterion from the ticket","Ask Copilot if the test is correct","Check that the test is under 50 lines of code"],correctIndex:1,explanation:"A passing test that checks the wrong things gives false confidence. The human review step — mapping assertions to acceptance criteria — is the non-negotiable governance gate."}},{id:12,title:"CI/CD & Quick Reference",subtitle:"Running tests in pipelines and command cheat sheet",icon:"🔧",audience:"All Roles",sections:[{heading:"GitLab CI Pipeline",content:"Add this job to your .gitlab-ci.yml to run Playwright tests on every merge request. Tests run in a Docker container with browsers pre-installed.",code:`# .gitlab-ci.yml
playwright-tests:
image: mcr.microsoft.com/playwright:v1.42.0-jammy
stage: test
script:
  - npm ci
  - npx playwright test --reporter=junit
artifacts:
  when: always
  paths:
    - test-results/
    - playwright-report/
  reports:
    junit: results.xml
rules:
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"`,codeLanguage:"yaml"},{heading:"Command Cheat Sheet",content:"The commands you'll use 90% of the time. Print this and tape it next to your monitor.",table:{headers:["Command","What It Does"],rows:[["npx playwright test","Run all tests (headless)"],["npx playwright test --headed","Run with visible browser"],["npx playwright test --ui","Open interactive test runner UI"],["npx playwright test login.spec.ts","Run one specific test file"],["npx playwright test -g 'login'","Run tests matching 'login' in name"],["npx playwright test --project=chromium","Run in Chrome only"],["npx playwright codegen localhost:3000","Launch recorder"],["npx playwright show-report","Open HTML test report"],["npx playwright show-trace trace.zip","Open trace viewer"],["npx playwright test --update-snapshots","Update visual baselines"]]},tip:"Non-coders: The four commands you'll use most are: codegen (record), test --headed (run visible), show-report (see results), and show-trace (debug failures)."},{heading:"Resources",content:"Official references and recommended learning resources.",table:{headers:["Resource","URL","Best For"],rows:[["Playwright Docs","playwright.dev","API reference, guides, best practices"],["Playwright Best Practices","playwright.dev/docs/best-practices","Official patterns for reliable tests"],["Playwright Videos","youtube.com/@playwright","Visual walkthroughs"],["GitHub Copilot Docs","docs.github.com/copilot","Copilot Chat features and commands"],["Bondar Academy","bondaracademy.com","Structured Playwright learning path"],["PractiTest Transition Guide","practitest.com","Manual → automated tester mindset shifts"],["Team Slack","#team-testing","Questions, pairing requests"]]}}]}];(0,h.createRoot)(document.getElementById("root")).render((0,f.jsx)(p.StrictMode,{children:(0,f.jsx)(function(){let[e,t]=(0,p.useState)(0),[n,r]=(0,p.useState)(new Set),[a,o]=(0,p.useState)(!0),l=e=>{r(t=>new Set([...t,e]))},i=Math.round(n.size/nc.l
