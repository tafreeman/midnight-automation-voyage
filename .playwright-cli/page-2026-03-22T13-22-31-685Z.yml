            - heading "The Automation Decision Framework" [level=2] [ref=e416]
            - paragraph [ref=e417]: One of the most common mistakes new automation teams make is trying to automate everything. Industry leaders typically achieve 60–80% automation coverage for regression testing, and that's considered excellent. The remaining 20–40% consists of tests where manual execution is more practical, cost-effective, or genuinely necessary. Your goal isn't 100% automation — it's automating the RIGHT things.
