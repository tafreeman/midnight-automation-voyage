            - heading "What This Guide Optimizes For" [level=2] [ref=e417]
            - paragraph [ref=e418]: "This guide is built for people who want to turn acceptance criteria into reliable automated checks with as little friction as possible. Playwright handles browser automation, Copilot accelerates authoring, and the workflow stays grounded in visible assertions and human review. The goal is simple: faster, clearer feedback with less guesswork."
