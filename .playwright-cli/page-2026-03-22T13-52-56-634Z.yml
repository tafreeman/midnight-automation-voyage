          - article [ref=e462]:
            - heading "The Mental Model" [level=2] [ref=e463]
            - paragraph [ref=e464]: "Think of it this way: Playwright is a robot that clicks through your app exactly how a user would. Copilot is a writing assistant that helps you tell that robot what to do. You describe the user journey. Copilot translates it into instructions. Playwright executes those instructions across browsers. You review the results and confirm correctness. The human is always the final authority on whether a test is right."
